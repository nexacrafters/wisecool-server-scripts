# Wisecool Secure Terminal Proxy
# Validates session tokens before allowing terminal access
# Access via: https://admin.wisecool.tn/api/terminal-ws/

services:
  terminal-proxy:
    build: ./secure-proxy
    container_name: wisecool-terminal-proxy
    restart: unless-stopped
    environment:
      - PORT=3001
      - TTYD_HOST=172.20.0.1
      - TTYD_PORT=7681
      - API_URL=https://api.wisecool.tn/v1/api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.terminal.rule=Host(`term.wisecool.tn`)"
      - "traefik.http.routers.terminal.entrypoints=https"
      - "traefik.http.routers.terminal.tls=true"
      - "traefik.http.routers.terminal.tls.certresolver=letsencrypt"
      - "traefik.http.services.terminal.loadbalancer.server.port=3001"
    networks:
      - coolify

networks:
  coolify:
    external: true
